version: '3.8'

services:
  # ─── DATABASE LAYER ─────────────────────────────────────────────────────────
  postgres:
    container_name: djs-postgres-prod
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-scheduler}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-scheduler}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - djs-network

  # ─── CONNECTION POOLING LAYER ───────────────────────────────────────────────
  pgbouncer:
    container_name: djs-pgbouncer-prod
    image: edoburu/pgbouncer:latest
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-scheduler}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - djs-network

  # ─── CACHE / STATE STORAGE LAYER ────────────────────────────────────────────
  redis:
    container_name: djs-redis-prod
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_pass_change_me} --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test:
        [
          'CMD',
          'redis-cli',
          '-a',
          '${REDIS_PASSWORD:-redis_secure_pass_change_me}',
          'ping',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - djs-network

  # ─── BACKEND API SERVICES ───────────────────────────────────────────────────
  api:
    container_name: djs-api-prod
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@pgbouncer:6432/${DB_NAME:-scheduler}?pgbouncer=true
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_pass_change_me}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_me_in_production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3002}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:3002/health || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - djs-network

  # ─── SCHEDULER ENGINE / DAEMON WORKERS ──────────────────────────────────────
  worker:
    container_name: djs-worker-prod
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@pgbouncer:6432/${DB_NAME:-scheduler}?pgbouncer=true
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_pass_change_me}@redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - djs-network

  # ─── FRONTEND DASHBOARD SERVICE ─────────────────────────────────────────────
  dashboard:
    container_name: djs-dashboard-prod
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:80/api/v1}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - djs-network

  # ─── REVERSE PROXY LAYER ────────────────────────────────────────────────────
  nginx:
    container_name: djs-nginx-prod
    image: nginx:1.25-alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Placeholder for SSL certificates
      # - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - dashboard
    networks:
      - djs-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  djs-network:
    driver: overlay
