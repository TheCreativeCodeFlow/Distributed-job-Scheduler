# Define Upstream Services
upstream api_service {
    server api:3002;
    keepalive 32;
}

upstream dashboard_service {
    server dashboard:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    # Update with your registered domain name in production
    server_name localhost;

    # ─── SECURITY HEADERS ─────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ─── REVERSE PROXY ROUTING ────────────────────────────────────────────────

    # 1. API SSE Event Stream Endpoint (Special rules)
    location /api/v1/events/stream {
        proxy_pass http://api_service;
        
        # Disable buffering to allow direct streaming output chunks
        proxy_buffering off;
        proxy_cache off;
        
        # Keep connection open for long periods
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        
        # Headers required for connection longevity
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        
        # Basic proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Standard API Requests (with rate limiting)
    location /api/v1 {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://api_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Proxy timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 3. Next.js Static assets (Cache indefinitely)
    location /_next/static {
        proxy_pass http://dashboard_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_set_header Host $host;
        
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 4. Next.js Dashboard App UI (All other routes)
    location / {
        proxy_pass http://dashboard_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache control for HTML pages
        add_header Cache-Control "public, no-cache, must-revalidate";
    }
}
